
name: Build Maven Project

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      # Download source code on GitHub hosted runner
      - name: Checkout source code
        uses: actions/checkout@v4


      # Install JDK on runner
      - name: Setup Java JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven


      # Compile, test and package JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests


      # Store generated JAR as GitHub artifact
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: billdesk-application-jar
          path: target/*.jar
          retention-days: 30
